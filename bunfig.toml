[install]
exact = true

[test]
# CLAUDE.md §3 coverage: 80% lines; 100% on hook evaluator, lease manager, idempotency-key gen.
coverage = true
coverageThreshold = 0.80
preload = ["./test/setup.ts"]
# Exclude integration-only shells and third-party facades whose coverage can only be
# exercised through live infrastructure (CLAUDE.md §3 — real Postgres for integration,
# never mocked). These files are covered by test/integration/* runs against a real DB.
coveragePathIgnorePatterns = [
  "**/*.test.ts",
  "test/**",
  "src/db/migrate-apply.ts",
  "src/telemetry/otel.ts",
  "src/work_queue/queue-ops.ts",
  # Agent creation domain function — DB shell, covered by test/integration/agent/create.test.ts.
  "src/agent/create.ts",
  # Agent load — DB shell, covered by test/integration/trigger/handlers.test.ts.
  "src/agent/load.ts",
  # Session creation — DB shell, covered by test/integration/trigger/handlers.test.ts.
  "src/session/create.ts",
  # Trigger envelope DB ops — covered by test/integration/trigger/handlers.test.ts.
  "src/trigger/envelope-ops.ts",
  # Trigger handlers — DB-dependent shell, covered by test/integration/trigger/handlers.test.ts.
  "src/trigger/handlers.ts",
  # HTTP layer — exercised end-to-end by test/integration/http/agents.test.ts with real Postgres.
  "src/http/app.ts",
  "src/http/routes/agents.ts",
  "src/http/server.ts",
  # Worker entrypoint — reads env and bootstraps process, covered by integration/worker tests.
  "src/worker/main.ts",
]
